services:
  postgres:
    image: postgres:15-alpine
    container_name: mm_postgres
    environment:
      POSTGRES_DB: mirrormeet
      POSTGRES_USER: mm_user
      POSTGRES_PASSWORD: mm_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm_user -d mirrormeet"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mm_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:latest
    container_name: mm_minio_mc
    depends_on:
      - minio
    entrypoint: |
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 && \
      mc mb -p local/mirrormeet && \
      mc anonymous set download local/mirrormeet && \
      # Set CORS to allow browser uploads from localhost
      echo '{\n  "Version": "1",\n  "Rules": [\n    {\n      "AllowedOrigin": ["*", "http://localhost:3000", "http://127.0.0.1:3000"],\n      "AllowedMethod": ["GET", "PUT", "HEAD"],\n      "AllowedHeader": ["*"],\n      "ExposeHeader": ["ETag"],\n      "MaxAgeSeconds": 3000\n    }\n  ]\n}' > /tmp/cors.json && \
      mc cors set local/mirrormeet /tmp/cors.json && \
      echo 'Buckets ready' && sleep 2"

volumes:
  db_data:
  minio_data:
