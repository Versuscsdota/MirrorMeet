services:
  postgres:
    image: postgres:15-alpine
    container_name: mm_postgres
    environment:
      POSTGRES_DB: mirrormeet
      POSTGRES_USER: mm_user
      POSTGRES_PASSWORD: mm_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm_user -d mirrormeet"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mm_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 && 
      mc mb -p local/mirrormeet || true && 
      mc anonymous set download local/mirrormeet && 
      echo '{
        \"Version\": \"1\",
        \"Rules\": [{
          \"AllowedOrigin\": [\"http://77.73.131.100\"],
          \"AllowedMethod\": [\"GET\",\"PUT\",\"HEAD\"],
          \"AllowedHeader\": [\"*\"],
          \"ExposeHeader\": [\"ETag\"],
          \"MaxAgeSeconds\": 3000
        }]
      }' > /tmp/cors.json && 
      mc cors set local/mirrormeet /tmp/cors.json &&
      echo 'Buckets ready'
      "

  server:
    build:
      context: ./server
    container_name: mm_server
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
    container_name: mm_web
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE=https://api.example.com

  caddy:
    image: caddy:2.8
    container_name: mm_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - web

volumes:
  db_data:
  minio_data:
  caddy_data:
  caddy_config:
